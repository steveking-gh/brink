[workspace]
members = [
    "ast",
    "ir",
    "symtable",
    "linearizer",
    "layoutdb",
    "engine",
    "process",
    "irdb",
    "diags",
    "map",
    "ext",
    "const_eval",
    "brink_extension",
    "std/crc32c",
    "std/sha256",
    "extensions",
]

[workspace.package]
version = "5.0.5"
authors = ["Steve King <sk@metrokings.com>"]
edition = "2024"

[package]
name = "brink"
version = "5.0.5"
build = "build.rs"
license-file = "LICENSE.txt"
readme = "README.md"
homepage = "https://github.com/steveking-gh/brink"
repository = "https://github.com/steveking-gh/brink"
keywords = ["linker",
            "cli",
            "domain-specific-language",
            "build"]
categories = ["development-tools::build-utils"]
authors = ["Steve King <sk@metrokings.com>"]
edition = "2024"

# See more keys and their definitions at
# https://doc.rust-lang.org/cargo/reference/manifest.html

[profile.release]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
lto = 'thin'
panic = 'unwind'
incremental = false
codegen-units = 16
rpath = false

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"

[features]
default = ["std-crc32c", "std-sha256"]
std-crc32c = ["process/std-crc32c"]
std-sha256  = ["process/std-sha256"]

[dependencies]
indextree = "4.3.1"
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0.34"
process = { path = "./process" }
tracing = "0.1.44"
tracing-subscriber = "0.3.22"

[dev-dependencies]
assert_cmd = "1.0.1"
predicates = "1.0.5"
serial_test = "0.5.1"
serde_json = "1"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace]
members = [
    "locationdb",
    "mapdb",
    "depth_guard",
    "ast",
    "astdb",
    "ir",
    "symtable",
    "linearizer",
    "layoutdb",
    "regiondb",
    "layout_phase",
    "process",
    "irdb",
    "diags",
    "map_phase",
    "exec_phase",
    "validation_phase",
    "extension_registry",
    "const_eval",
    "brink_extension",
    "ireval",
    "output_buffer",
    "std/crc32c",
    "std/sha256",
    "std/md5",
    "std/xor",
    "std/esp_checksum",
    "extensions",
    "objfile",
]

[workspace.package]
version = "8.0.0"
authors = ["Steve King <sk@metrokings.com>"]
edition = "2024"

[package]
name = "brink"
description = "Ergonomic firmware and binary file creation tool."
version = "8.0.0"
build = "build.rs"
license-file = "LICENSE.txt"
readme = "README.md"
homepage = "https://github.com/steveking-gh/brink"
repository = "https://github.com/steveking-gh/brink"
keywords = ["linker",
            "cli",
            "domain-specific-language",
            "build"]
categories = ["development-tools::build-utils"]
authors = ["Steve King <sk@metrokings.com>"]
edition = "2024"

[lints]
workspace = true

[profile.release]
opt-level = 3
debug = false
debug-assertions = false
overflow-checks = false
lto = 'thin'
panic = 'unwind'
incremental = false
codegen-units = 16
rpath = false

# The profile that 'dist' will build with
[profile.dist]
inherits = "release"
lto = "thin"

[features]
default = ["std-crc32c", "std-sha256", "std-md5", "std-xor", "std-esp-checksum"]
std-crc32c        = ["process/std-crc32c"]
std-sha256        = ["process/std-sha256"]
std-md5           = ["process/std-md5"]
std-xor           = ["process/std-xor"]
std-esp-checksum  = ["process/std-esp-checksum"]

[dependencies]
indextree = "4.3.1"
clap = { version = "4.5", features = ["derive"] }
anyhow = "1.0.34"
process = { path = "./process" }
tracing = "0.1.44"
tracing-subscriber = "0.3.22"

[dev-dependencies]
assert_cmd = "2.2.1"
predicates = "3.1.4"
serial_test = "3.4.0"
serde_json = "1"

summary: >
  Brink is a domain-specific language (DSL) compiler for composing binary
  image files (ROM, FLASH, firmware, etc.).  Source files declare sections,
  consts, and an output; the compiler resolves sizes, addresses, and offsets,
  then writes a flat binary.

pipeline:
  # Each stage is a Cargo crate.  Data flows left to right.
  stages:
    - name: Lexer + Parser → AST
      crate: ast
      input: .brink source text
      output: Ast (arena-based indextree), AstDb (index of sections/consts/output)
      notes: Hand-rolled lexer (LexToken enum). Pratt parser for expressions.
             ParseIfContext enum distinguishes TopLevel vs Section if/else.

    - name: const_eval
      crate: const_eval
      input: Ast, AstDb.const_statements, -D defines
      output: SymbolTable (fully resolved const values)
      notes: Two-pass — lowering (AST → LinIR via Linearizer) then evaluation.
             Handles top-level if/else for const-only statements.

    - name: prune
      crate: prune
      input: Ast, SymbolTable
      output: pruned Ast (clone with if/else nodes replaced by taken branch)
      notes: Two steps.
             Step 1 — prune root-level if/else, promote only Section+If nodes.
             Step 2 — prune section-body if/else for all sections now at root.
             keep filter (fn(LexToken)->bool) distinguishes the two steps.

    - name: AstDb (second build)
      crate: ast
      input: pruned Ast
      output: AstDb with validate=true (full nesting + circular-ref check)
      notes: First AstDb uses validate=false (skips nesting) to avoid false
             positives on sections inside top-level if blocks.

    - name: LayoutDb
      crate: layoutdb
      input: pruned Ast, pruned AstDb
      output: flat LinIR + LinOperand vectors
      notes: Walks section body recursively, inlines wr-section references.

    - name: IRDb
      crate: irdb
      input: LayoutDb, SymbolTable
      output: typed IR (Vec<IRItem>)
      notes: Validates types, resolves extensions, handles sizeof/addr builtins.

    - name: Engine
      crate: engine
      input: IRDb, ExtensionRegistry
      output: binary byte vector written to output file
      notes: Iterative evaluator; reruns until sizes/addresses stabilize.

  error_codes:
    PROC_1: AST parse failure
    PROC_2: const_eval failure
    PROC_3: prune or second AstDb failure
    PROC_4: LayoutDb failure
    PROC_5: IRDb failure
    PROC_6: Engine failure

extensions:
  api_crate: brink_extension
  registry: ExtensionRegistry (built in process.rs, passed to IRDb + Engine)
  bundled:
    - std/crc32c  (feature: std-crc32c)
    - std/sha256  (feature: std-sha256)
    - std/md5     (feature: std-md5)
  custom: implement BrinkExtension trait
  planned:
    named_args: >
      Extension call sites support named arguments, e.g. foo::bar(data=my_section, seed=42).
      Motivation: positional args of the same type (e.g. two u64s) can be silently
      swapped with no compile-time or runtime error.  Named args prevent this class
      of mistake.

      Key design decisions (do not change without deep review):

      1. ParamDesc/ParamKind on the trait.  BrinkExtension gains fn params(&self) -> &[ParamDesc]
         with default &[].  ParamDesc carries name: &'static str and kind: ParamKind.
         ParamKind variants: Int | Str | ByteArray.
         ByteArray (not Section) is the declared kind for any parameter that accepts a sequence
         of bytes.  At call sites a section name supplies the bytes.  The declaration says what
         type of data the parameter accepts; the mechanism (section name) is separate.
         ByteArray aligns with ParameterValue::ByteArray in the planned return-value feature,
         and naturally supports multiple ByteArray parameters per extension.
         Empty params() slice = opt-out; positional-only rules apply with legacy heuristics.

      2. IRKind::ExtensionCallSection eliminated.  All extension calls use IRKind::ExtensionCall
         with uniform operand layout [name, arg0..., output].  The engine resolves ByteArray
         params by consulting cached_params in the registry: for each user-arg operand whose
         corresponding cached_params[i].kind == ByteArray, resolve the section identifier to
         ExtArg::Section from wr_dispatches.  This supports any number of ByteArray params at
         any positions.  disambiguate_extension_call in irdb.rs is removed entirely.
         Legacy path: when cached_params is empty, the engine falls back to the old heuristic
         (first Identifier in user-arg range = section) for backward compat with extensions
         that predate named args.

      3. Canonicalization in IRDb, not the engine.  IRDb resolves argument names, validates
         them against params(), and rewrites operand order to canonical (params()) order before
         pushing to ir_vec.  The engine receives args in declaration order; only section
         resolution (converting Identifier to ExtArg::Section) remains engine-side.

      4. Mixed positional+named is rejected at parse time (AST_40).

      5. LexToken::NamedArg node in AST; param_name: Option<String> field on LinOperand and
         IROperand carries the name from parser through to IRDb.

      6. New error codes: IRDB_48 (unknown param name), IRDB_49 (duplicate name),
         IRDB_50 (mixed positional+named), IRDB_51 (missing required param),
         IRDB_52 (ByteArray param received non-section-name value),
         IRDB_53 (positional count mismatch when params declared).
         EXEC_56 (ambiguous section) now fires per-ByteArray-param, not once globally.

      Phase order:
        1. brink_extension/lib.rs -- ParamDesc, ParamKind (Int|Str|ByteArray), params() default
        2. std extensions + mocks -- implement params() with ByteArray where applicable
        3. ast/ast.rs -- LexToken::NamedArg, named-arg parsing, AST_40/AST_41
        4. linearizer/linearizer.rs -- param_name on LinOperand, Namespace arm update
        5. ir/ir.rs -- param_name on IROperand; remove ExtensionCallSection variant
        6. irdb/irdb.rs -- remove disambiguate_extension_call; name resolution, reorder,
           validate ByteArray params, new IRDB_4x/5x error codes
        7. engine/engine.rs -- merge ExtensionCallSection arms into ExtensionCall;
           resolve ByteArray params from cached_params; per-param EXEC_56 check
        8. ext/ext.rs -- add cached_params: Vec<ParamDesc> to ExtensionEntry
        9. tests
    return_values: >
      Extension calls return a typed ParameterValue so the result flows into
      downstream expressions (wr32, const, assert, arithmetic).  Requires a new
      ParameterValue::ByteArray(Vec<u8>) variant (or similar) to carry multi-byte
      results.  BrinkExtension::execute signature would change from Result<(), String>
      to Result<ParameterValue, String> or a richer return type.  DataType gains a
      Bytes variant.  Engine stores the returned value into self.parms at the output
      operand slot so downstream IR can read it.  Current write-to-buffer style
      extensions remain valid; return-value style is additive.

language_features:
  const: compile-time integer/string constants; arithmetic, comparison, logical ops
  if_else:
    top_level: conditions are const; body may contain section definitions or const assigns
    section_body: conditions are const; body may contain layout-time statements (wr8, wr, etc.)
  section: named block of layout-time statements
  output: single required directive naming the root section to emit
  wr: write a named section into the current section
  wr8/wr16/.../wr64: write integer literals
  wrs: write a string literal
  wrf: write a binary file
  align: pad to alignment boundary
  set_addr / set_addr_offset / set_sec_offset / set_file_offset: address control
  label: named location for map output
  assert: compile-time or layout-time assertion
  print: compile-time diagnostic output
  sizeof / addr / addr_offset / sec_offset / file_offset: layout-time builtins
  include: include another .brink file

diagnostics:
  crate: diags
  backend: ariadne
  format: richly formatted errors with source spans; two-location variants (err2)

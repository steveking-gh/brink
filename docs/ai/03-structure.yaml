repo_root: /home/kings/projects/brink

# ── Compiler pipeline crates ──────────────────────────────────────────────────
crates:
  ast:
    path: ast/ast.rs
    role: Lexer, parser, AST, AstDb
    key_types: [Ast, AstDb, LexToken, Section, Output, ParseIfContext, RegionEntry]
    key_fns: [Ast::new, AstDb::new(validate:bool), parse_if_r, parse_if_body_r,
              parse_region, parse_region_contents, try_parse_section_stmt,
              is_section_expr_tok]
    notes: >
      AstDb::new validate=false skips nesting validation (used pre-prune).
      ParseIfContext (TopLevel | Section) threads through parse_if_r and
      parse_if_body_r.  Section token allowed in TopLevel if/else bodies.
      Ast nodes hold TokenInfo by value (rustc-style), avoiding arena index lookups.

      Region AST layer (Steps 3+4 COMPLETE):
        LexToken::Region and LexToken::In are keywords (lexer-mapped).
        LexToken::RegionProp — synthetic; tok=RegionProp, val=property name,
          one child (expression).  Children of the Region root node.
        LexToken::RegionRef — synthetic; tok=RegionRef, val=region name, no
          children.  Second child of a Section root node when bound with `in`.
        RegionEntry — holds nid, src_loc, addr/size/default_align/default_fill;
          addr/size populated to 0/0 by AstDb; filled by const_eval::evaluate_regions.
        Section::region — Option<String> set from RegionRef child if present.
        AstDb::regions — HashMap<String, RegionEntry>; name conflicts with
          sections (AST_48) and consts (AST_63) detected in AstDb::new.
        Section binding validation: undeclared region → AST_56; duplicate
          binding to same region → AST_57.
        linearizer treats RegionRef as syntactic noise (no IR emitted).

  const_eval:
    path: const_eval/const_eval.rs
    role: Const expression evaluation and AST pruning
    key_types: [ConstIR, LinIR, LinOperand]
    key_fns: [evaluate, evaluate_and_prune]
    notes: >
      Acts as an AST walker. Evaluates constants and prunes dead if/else branches
      simultaneously, returning a cloned working AST. Eliminates the need for a separate prune crate.

  prune:
    path: (removed)
    role: (removed)
    notes: >
      The prune crate has been completely eliminated and merged into const_eval.

  layoutdb:
    path: layoutdb/layoutdb.rs
    role: Flatten pruned AST to LinIR + LinOperand vectors
    key_types: [LayoutDb]
    key_fns: [LayoutDb::new, record_r]

  irdb:
    path: irdb/irdb.rs (approx)
    role: Typed IR construction and validation
    key_types: [IRDb, IRItem]

  exec_phase:
    path: exec_phase/exec_phase.rs
    role: Binary generation; writes core operations and invokes extensions
    key_types: [ExecPhase]
    key_fns: [ExecPhase::execute, execute_core_operations, execute_extensions]
    notes: >
      execute_core_operations writes Wr/Wrs/Wrf bytes and pre-pads zeroed
      space for extension output regions.  execute_extensions memory-maps the
      file and patches each extension's output in place.  Assert instructions
      are skipped here; validation runs in validation_phase before exec.

  validation_phase:
    path: validation_phase/validation_phase.rs
    role: Assert evaluation after layout, before byte generation
    key_types: [ValidationPhase]
    key_fns: [ValidationPhase::validate]
    notes: >
      Reads only ParmValDb and IRDb -- both layout outputs, neither mutated
      during exec.  No IR operation reads bytes from the output file, so
      asserts evaluate layout-computed values exclusively.
      CAUTION: if extension return values are implemented, keep ValidationPhase
      ordered after execute_extensions so extension output populates ParmValDb
      before assert evaluation.

  linearizer:
    path: linearizer/linearizer.rs
    role: Shared expression lowering (AST subtree → LinIR)
    key_types: [Linearizer, LinIR, LinOperand]
    key_fns: [record_expr_r, record_expr_children_r, tok_to_irkind]
    notes: Shared by const_eval and layoutdb.

  ir:
    path: ir/
    role: Shared IR type definitions
    key_types: [IRKind, ParameterValue, ConstBuiltins]

  symtable:
    path: symtable/
    role: Const symbol table (define, declare, assign, get_value, mark_used)
    key_types: [SymbolTable]

  diags:
    path: diags/
    role: Diagnostic formatting via ariadne
    key_types: [Diags, SourceSpan]
    key_fns: [err0, err1, err2, note0, warn1]

  map:
    path: map/
    role: Map output (CSV, JSON, C99, Rust) after Engine completes

  ext:
    path: ext/
    role: Extension registry and dispatch; re-exports BrinkExtension and ExtArg
    key_types: [ExtensionEntry, ExtensionRegistry]
    key_fns: [register, get]

  brink_extension:
    path: brink_extension/
    role: Public extension API traits
    key_types: [BrinkExtension, ExtArg]
    notes: >
      ExtArg<'a> enum: Int(u64), Str(&str),
      Section { start: u64, len: u64, data: &[u8] }.
      All extensions implement BrinkExtension::execute<'a>(&self, &[ExtArg<'a>], &mut [u8]).
      BrinkRangedExtension removed; section data arrives via ExtArg::Section in args[0].

  process:
    path: process/process.rs
    role: Pipeline orchestrator; single entry point for the binary
    notes: >
      Calls stages in order: Ast → AstDb(false) → const_eval(evaluate_and_prune) →
      AstDb(true) → LayoutDb → IRDb → LayoutPhase → ValidationPhase →
      ExecPhase → map output.

# ── Standard library extensions ───────────────────────────────────────────────
std_extensions:
  std/crc32c:  CRC-32C checksum extension
  std/sha256:  SHA-256 hash extension
  std/md5:     MD5 hash extension

# ── Binary entry point ────────────────────────────────────────────────────────
binary:
  path: src/main.rs
  role: CLI arg parsing (clap), tracing setup, calls process::process()

# ── Tests ─────────────────────────────────────────────────────────────────────
tests:
  integration: tests/integration.rs   # 294 tests as of 2026-04-14
  fixtures: tests/*.brink             # ~267 .brink source fixtures
  helpers: [assert_brink_success, assert_brink_failure, assert_brink_warning,
            assert_brink_no_warning]
  binary_comparison: fs::read() → assert_eq!(bytevec, vec![...])

# ── Fuzzing ───────────────────────────────────────────────────────────────────
fuzz:
  path: layoutdb/fuzz/fuzz_targets/fuzz_target_1.rs
  notes: Uses AstDb::new(..., true).  Ast::new signature differs from main path.

# ── Other dirs ────────────────────────────────────────────────────────────────
other:
  vscode-brink/: VSCode syntax highlighting extension
  images/:       SVG diagrams for README
  docs/ai/:      AI context files (this file and siblings)
  .claude/:      CLAUDE.md workspace instructions

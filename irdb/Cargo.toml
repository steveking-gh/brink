[package]
name = "irdb"
version.workspace = true
authors.workspace = true
edition.workspace = true

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
path = "irdb.rs"

[dependencies]
indextree = "4.3.1"
anyhow = "1.0.34"
parse_int = "0.9.0"

# local dependencies
diags = { path = "../diags" }
ast = { path = "../ast" }
ir = { path = "../ir" }
symtable = { path = "../symtable" }
layoutdb = { path = "../layoutdb" }
linearizer = { path = "../linearizer" }
extension_registry = { path = "../extension_registry" }
tracing = "0.1.44"
